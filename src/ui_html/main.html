<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/webui.js"></script>
    <title>AlienS - Code Learning App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 95vw;
            height: 95vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: auto;
        }

        /* ========== КНОПКИ ========== */
        .btn {
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            padding: 8px 16px;
        }

        .btn--primary {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
        }

            .btn--primary:hover {
                background: #764ba2;
            }

        .btn--logout {
            background: #dc3545;
            color: white;
        }

            .btn--logout:hover {
                background: #c82333;
            }

        /* ========== ВЕРХНЯЯ ПАНЕЛЬ ========== */
        .top-bar {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            display: flex;
            justify-content: space-between;
        }

            .top-bar.hidden {
                display: none;
            }

            .top-bar .btn {
                background: white;
                border: 2px solid #667eea;
                color: #667eea;
                border-radius: 25px;
                padding: 10px 20px;
            }

                .top-bar .btn:hover {
                    background: #667eea;
                    color: white;
                }

        /* ========== ОСНОВНОЙ КОНТЕЙНЕР ========== */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        /* ========== ГЛАВНЫЙ ЭКРАН ========== */
        .screen {
            display: none;
        }

            .screen.active {
                display: block;
            }

        .main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 20px;
        }

            .main-menu .btn {
                width: 400px;
                padding: 25px;
                font-size: 28px;
                background: white;
                color: #667eea;
                border: 3px solid #667eea;
                border-radius: 20px;
            }

                .main-menu .btn:hover {
                    background: #667eea;
                    color: white;
                }

        .welcome-message {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 30px;
            margin: 20px 30px 40px;
        }

            .welcome-message h1 {
                color: #333;
                font-size: 36px;
                margin-bottom: 15px;
            }

        /* ========== ЭКРАН КУРСА ========== */
        .course-layout {
            display: flex;
            gap: 20px;
            height: 100%;
        }

        .topic-list {
            width: 350px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .topic-item {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            cursor: pointer;
        }

            .topic-item:hover {
                background: rgba(102, 126, 234, 0.2);
            }

        .topic-content {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 30px;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        /* ========== МОДАЛЬНОЕ ОКНО ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

            .modal-overlay.active {
                display: flex;
            }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .field {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .field-code {
            font-family: 'Courier New', monospace;
            min-height: 200px;
        }

        .field-output {
            background: #f5f5f5;
            min-height: 150px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            position: relative;
            margin: 15px 0;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .test-question {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .test-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .main-menu .btn {
                width: 300px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель -->
        <div class="top-bar" id="topBar">
            <div class="top-bar-left">
                <button class="btn" onclick="showMainMenu()">🏠 Главное меню</button>
            </div>
            <div class="top-bar-right">
                <button class="btn" onclick="openCodeExecutor()">💻 Исполнитель кода</button>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="scrollable-content" id="scrollableContent">
            <!-- Главный экран -->
            <div id="mainScreen" class="screen active">
                <div class="welcome-message">
                    <h1>Добро пожаловать в AlienS!</h1>
                    <p>Интерактивная платформа для изучения программирования</p>
                </div>
                <div class="main-menu">
                    <button class="btn" onclick="openCourse()">📚 Открыть курс</button>
                    <button class="btn" onclick="createCourse()">✏️ Создать курс</button>
                    <button class="btn" onclick="showAccount()">👤 Аккаунт</button>
                    <button class="btn" onclick="showSettings()">⚙️ Настройки</button>
                    <button class="btn btn--logout" onclick="exitApp()">🚪 Выйти</button>
                </div>
            </div>

            <!-- Экран курса -->
            <div id="courseScreen" class="screen">
                <div class="course-layout">
                    <div class="topic-list" id="topicList">
                        <h3>📖 Загрузка...</h3>
                    </div>
                    <div class="topic-content" id="topicContent">
                        <h2>Выберите тему из списка</h2>
                    </div>
                </div>
            </div>

            <!-- Экран создания курса -->
            <div id="createCourseScreen" class="screen">
                <div style="max-width: 800px; margin: 0 auto;">
                    <h2>Создание курса</h2>
                    <input type="text" class="field" id="courseTitle" placeholder="Название курса">
                    <input type="text" class="field" id="courseAuthor" placeholder="Автор">
                    <textarea class="field" id="courseDescription" placeholder="Описание курса" rows="5"></textarea>
                    <button class="btn btn--primary" onclick="saveCourse()">💾 Сохранить курс</button>
                </div>
            </div>

            <!-- Экран аккаунта -->
            <div id="accountScreen" class="screen">
                <div style="max-width: 600px; margin: 0 auto;">
                    <h2>Аккаунт</h2>
                    <div class="field" id="accountInfo">Загрузка...</div>
                    <button class="btn btn--primary" onclick="editProfile()">✏️ Редактировать</button>
                </div>
            </div>

            <!-- Экран настроек -->
            <div id="settingsScreen" class="screen">
                <div style="max-width: 600px; margin: 0 auto;">
                    <h2>Настройки</h2>
                    <div class="field">
                        <label>Язык:</label>
                        <select id="languageSelect" onchange="changeLanguage(this.value)">
                            <option value="ru">Русский</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <button class="btn btn--primary" onclick="selectFolder()">📁 Открыть папку курсов</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно исполнителя кода -->
    <div class="modal-overlay" id="codeExecutorOverlay" onclick="if(event.target === this) closeCodeExecutor()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>Исполнитель кода</h2>
                <button class="btn btn--close" onclick="closeCodeExecutor()">×</button>
            </div>
            <textarea class="field field-code" id="codeInput" placeholder="Введите код...">print("Hello, World!")</textarea>
            <button class="btn btn--primary" onclick="executeCode()">Выполнить</button>
            <div class="field field-output" id="codeOutput">
                Результат выполнения...
            </div>
        </div>
    </div>

    <script>
        // Функции, которые будут вызываться из C++
        function showMainMenu() {
            document.getElementById('topBar').classList.remove('hidden');
            showScreen('mainScreen');
        }

        function openCourse() {
            showScreen('courseScreen');
            // Вызов C++ функции для загрузки курсов
            webui.call('load_courses');
        }

        function createCourse() {
            showScreen('createCourseScreen');
        }

        function showAccount() {
            showScreen('accountScreen');
            webui.call('load_account');
        }

        function showSettings() {
            showScreen('settingsScreen');
        }

        function exitApp() {
            if (confirm('Вы действительно хотите выйти?')) {
                webui.call('exit_app');
            }
        }

        function openCodeExecutor() {
            document.getElementById('codeExecutorOverlay').classList.add('active');
        }

        function closeCodeExecutor() {
            document.getElementById('codeExecutorOverlay').classList.remove('active');
        }

        function executeCode() {
            const code = document.getElementById('codeInput').value;
            document.getElementById('codeOutput').textContent = 'Выполнение...';
            webui.call('execute_code', code);
        }

        function saveCourse() {
            const course = {
                title: document.getElementById('courseTitle').value,
                author: document.getElementById('courseAuthor').value,
                description: document.getElementById('courseDescription').value
            };
            webui.call('save_course', JSON.stringify(course));
        }

        function editProfile() {
            webui.call('edit_profile');
        }

        function changeLanguage(lang) {
            webui.call('change_language', lang);
        }

        function selectFolder() {
            webui.call('select_folder');
        }

        // Функции, которые будут вызываться из C++ для обновления UI
        function updateTopicList(courses) {
            const data = JSON.parse(courses);
            const list = document.getElementById('topicList');
            let html = '<h3>📖 ' + data[0].title + '</h3>';
            data[0].topics.forEach((topic, index) => {
                html += '<div class="topic-item" onclick="loadTopic(' + index + ')">' +
                    (topic.type === 'test' ? '📝' : '📘') + ' ' + topic.title +
                    '</div>';
            });
            list.innerHTML = html;
        }

        function updateTopicContent(content) {
            const data = JSON.parse(content);
            const container = document.getElementById('topicContent');
            let html = '';
            data.blocks.forEach(block => {
                if (block.type === 'text') {
                    html += '<div class="theory-block">' + block.content + '</div>';
                } else if (block.type === 'code') {
                    html += '<div class="code-block"><pre>' + block.content +
                        '</pre><button class="copy-btn" onclick="copyCode(\'' +
                        block.content.replace(/'/g, "\\'") + '\')">Копировать</button></div>';
                }
            });
            container.innerHTML = html;
        }

        function updateAccountInfo(info) {
            const data = JSON.parse(info);
            document.getElementById('accountInfo').innerHTML =
                'Имя: ' + data.username + '<br>' +
                'Email: ' + data.email + '<br>' +
                'Курсов изучено: ' + data.courses;
        }

        function showResult(result) {
            document.getElementById('codeOutput').textContent = result;
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code);
            alert('Скопировано!');
        }

        // Вспомогательная функция для переключения экранов
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');

            // Скрываем верхнюю панель только на главном экране
            if (screenId === 'mainScreen') {
                document.getElementById('topBar').classList.add('hidden');
            } else {
                document.getElementById('topBar').classList.remove('hidden');
            }
        }

        // Загрузка темы
        function loadTopic(index) {
            webui.call('load_topic', index.toString());
        }

        // Закрытие по Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeCodeExecutor();
        });
    </script>
</body>
</html>
