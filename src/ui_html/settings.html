<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/webui.js"></script>
    <title>AlienS - Настройки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 95vw;
            height: 95vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: auto;
        }

        /* ========== КНОПКИ ========== */
        .btn {
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 10px;
        }

        .btn--primary {
            background: #667eea;
            color: white;
            padding: 12px 30px;
        }

            .btn--primary:hover {
                background: #764ba2;
            }

        .btn--secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 30px;
        }

            .btn--secondary:hover {
                background: rgba(102, 126, 234, 0.1);
            }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== ВЕРХНЯЯ ПАНЕЛЬ ========== */
        .top-bar {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .top-bar h1 {
                color: #333;
                font-size: 24px;
                margin: 0;
            }

            .top-bar .btn {
                background: white;
                border: 2px solid #667eea;
                color: #667eea;
                border-radius: 25px;
                padding: 10px 20px;
            }

                .top-bar .btn:hover {
                    background: #667eea;
                    color: white;
                }

        /* ========== ОСНОВНОЙ КОНТЕЙНЕР ========== */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        /* ========== КОНТЕНТ НАСТРОЕК ========== */
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .settings-fields {
            margin: 30px 0;
        }

        .settings-group {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

            .settings-group:last-child {
                border-bottom: none;
                margin-bottom: 0;
                padding-bottom: 0;
            }

        .settings-group-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .setting-item {
            margin-bottom: 25px;
        }

        .setting-label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 500;
            font-size: 15px;
        }

        .setting-description {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        /* ========== ПЕРЕКЛЮЧАТЕЛЬ (TOGGLE) ========== */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

            .toggle-switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }

            .toggle-slider:before {
                position: absolute;
                content: "";
                height: 26px;
                width: 26px;
                left: 4px;
                bottom: 4px;
                background-color: white;
                transition: .3s;
                border-radius: 50%;
            }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

            input:checked + .toggle-slider:before {
                transform: translateX(26px);
            }

        .toggle-label {
            margin-left: 10px;
            font-size: 15px;
            color: #333;
            vertical-align: middle;
        }

        /* ========== ПОЛЗУНОК (RANGE) ========== */
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .range-value {
            min-width: 80px;
            text-align: center;
        }

        .range-input {
            flex: 1;
            min-width: 200px;
        }

            .range-input input[type=range] {
                width: 100%;
                height: 8px;
                -webkit-appearance: none;
                background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
                border-radius: 4px;
                outline: none;
            }

                .range-input input[type=range]::-webkit-slider-thumb {
                    -webkit-appearance: none;
                    width: 20px;
                    height: 20px;
                    background: white;
                    border: 2px solid #667eea;
                    border-radius: 50%;
                    cursor: pointer;
                    transition: all 0.2s;
                    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
                }

                    .range-input input[type=range]::-webkit-slider-thumb:hover {
                        transform: scale(1.2);
                        background: #667eea;
                    }

            .range-input input[type=number] {
                width: 80px;
                padding: 8px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                font-size: 14px;
                text-align: center;
            }

                .range-input input[type=number]:focus {
                    outline: none;
                    border-color: #667eea;
                }

        .range-bounds {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            color: #888;
            font-size: 12px;
        }

        /* ========== ВЫПАДАЮЩИЙ СПИСОК (SELECT) ========== */
        .select-wrapper {
            position: relative;
            max-width: 400px;
        }

            .select-wrapper select {
                width: 100%;
                padding: 12px 15px;
                padding-right: 40px;
                border: 2px solid #e0e0e0;
                border-radius: 10px;
                font-size: 15px;
                background: white;
                cursor: pointer;
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
            }

                .select-wrapper select:focus {
                    outline: none;
                    border-color: #667eea;
                }

            .select-wrapper::after {
                content: '▼';
                font-size: 12px;
                color: #667eea;
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                pointer-events: none;
            }

            .select-wrapper select[multiple] {
                padding: 5px;
                height: auto;
                max-height: 200px;
                overflow-y: auto;
            }

                .select-wrapper select[multiple] option {
                    padding: 8px 12px;
                    margin: 2px 0;
                    border-radius: 5px;
                }

                    .select-wrapper select[multiple] option:checked {
                        background: #667eea linear-gradient(0deg, #667eea 0%, #667eea 100%);
                        color: white;
                    }

                .select-wrapper select[multiple] + .select-wrapper::after {
                    display: none;
                }

        /* ========== КНОПКИ ДЕЙСТВИЙ ========== */
        .settings-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid rgba(102, 126, 234, 0.3);
        }

            .settings-actions .btn {
                min-width: 120px;
            }

        /* ========== СТАТУС СОХРАНЕНИЯ ========== */
        .save-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

            .save-status.show {
                opacity: 1;
            }

            .save-status.success {
                background: rgba(40, 167, 69, 0.2);
                color: #28a745;
            }

            .save-status.error {
                background: rgba(220, 53, 69, 0.2);
                color: #dc3545;
            }

        @media (max-width: 768px) {
            .settings-container {
                padding: 20px;
            }

            .range-container {
                flex-direction: column;
                align-items: stretch;
            }

            .range-value {
                text-align: left;
            }

            .settings-actions {
                flex-direction: column;
            }

                .settings-actions .btn {
                    width: 100%;
                }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <h1>⚙️ Настройки</h1>
            <button class="btn" onclick="goToMainMenu()">🏠 Главное меню</button>
        </div>

        <!-- Основной контент -->
        <div class="scrollable-content">
            <div class="settings-container">
                <!-- Динамические настройки будут вставлены сюда -->
                <div id="settingsFields" class="settings-fields">
                    <div class="settings-group">
                        <div class="settings-group-title">Загрузка настроек...</div>
                    </div>
                </div>

                <!-- Кнопки действий -->
                <div class="settings-actions">
                    <button class="btn btn--secondary" onclick="resetChanges()" id="resetButton">Сбросить</button>
                    <button class="btn btn--primary" onclick="saveChanges()" id="saveButton">Сохранить</button>
                </div>

                <!-- Статус сохранения -->
                <div id="saveStatus" class="save-status"></div>
            </div>
        </div>
    </div>

    <script>
        // Хранение текущих значений настроек
        let settings = [];
        let currentValues = {};
        let originalValues = {};

        // Функция инициализации, вызываемая из C++ при загрузке страницы
        function initializeSettings(settingsData) {
            try {
                settings = JSON.parse(settingsData);

                // Инициализируем значения
                settings.forEach(setting => {
                    currentValues[setting.id] = setting.value !== undefined ? setting.value :
                                               (setting.default !== undefined ? setting.default : getDefaultForType(setting.type));
                    originalValues[setting.id] = currentValues[setting.id];
                });

                renderSettings();
                updateButtonsState();
            } catch (e) {
                console.error('Error initializing settings:', e);
                showStatus('Ошибка загрузки настроек', 'error');
            }
        }

        // Получение значения по умолчанию в зависимости от типа
        function getDefaultForType(type) {
            switch(type) {
                case 'toggle': return false;
                case 'range': return 0;
                case 'select': return '';
                default: return '';
            }
        }

        // Отрисовка настроек
        function renderSettings() {
            const container = document.getElementById('settingsFields');

            if (!settings || settings.length === 0) {
                container.innerHTML = `
                    <div class="settings-group">
                        <div class="settings-group-title">Нет доступных настроек</div>
                    </div>
                `;
                return;
            }

            // Группируем настройки по категориям
            const grouped = groupByCategory(settings);

            let html = '';

            for (const [category, categorySettings] of Object.entries(grouped)) {
                html += `
                    <div class="settings-group">
                        <div class="settings-group-title">${category}</div>
                `;

                categorySettings.forEach(setting => {
                    html += renderSettingItem(setting);
                });

                html += `</div>`;
            }

            container.innerHTML = html;

            // Добавляем обработчики событий
            addEventListeners();
        }

        // Группировка настроек по категориям
        function groupByCategory(settings) {
            return settings.reduce((groups, setting) => {
                const category = setting.category || 'Общие';
                if (!groups[category]) {
                    groups[category] = [];
                }
                groups[category].push(setting);
                return groups;
            }, {});
        }

        // Отрисовка отдельной настройки
        function renderSettingItem(setting) {
            const value = currentValues[setting.id];
            const description = setting.description ?
                `<div class="setting-description">${setting.description}</div>` : '';

            switch(setting.type) {
                case 'toggle':
                    return `
                        <div class="setting-item" data-id="${setting.id}">
                            <label class="setting-label">${setting.label}</label>
                            <div class="toggle-wrapper">
                                <label class="toggle-switch">
                                    <input type="checkbox"
                                           ${value ? 'checked' : ''}
                                           onchange="updateSetting('${setting.id}', this.checked)">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label">${value ? 'Вкл' : 'Выкл'}</span>
                            </div>
                            ${description}
                        </div>
                    `;

                case 'range':
                    const min = setting.min || 0;
                    const max = setting.max || 100;
                    const step = setting.step || 1;
                    const unit = setting.unit || '';

                    return `
                        <div class="setting-item" data-id="${setting.id}">
                            <label class="setting-label">${setting.label}</label>
                            <div class="range-container">
                                <div class="range-value">
                                    <input type="number"
                                           value="${value}"
                                           min="${min}"
                                           max="${max}"
                                           step="${step}"
                                           onchange="updateSetting('${setting.id}', this.value)"
                                           class="range-number">
                                </div>
                                <div class="range-input">
                                    <input type="range"
                                           value="${value}"
                                           min="${min}"
                                           max="${max}"
                                           step="${step}"
                                           oninput="updateRange('${setting.id}', this.value)">
                                    <div class="range-bounds">
                                        <span>${min} ${unit}</span>
                                        <span>${max} ${unit}</span>
                                    </div>
                                </div>
                            </div>
                            ${description}
                        </div>
                    `;

                case 'select':
                    const multiple = setting.multiple || false;
                    const options = setting.options || [];

                    let selectHtml = `<div class="select-wrapper">`;
                    selectHtml += `<select ${multiple ? 'multiple' : ''}
                                           onchange="updateSetting('${setting.id}', ${multiple ? 'getMultipleValues(this)' : 'this.value'})">`;

                    options.forEach(option => {
                        const selected = multiple ?
                            (value && value.includes(option.value)) :
                            (value === option.value);

                        selectHtml += `<option value="${option.value}" ${selected ? 'selected' : ''}>${option.label}</option>`;
                    });

                    selectHtml += `</select></div>`;

                    return `
                        <div class="setting-item" data-id="${setting.id}">
                            <label class="setting-label">${setting.label}</label>
                            ${selectHtml}
                            ${description}
                        </div>
                    `;

                default:
                    return '';
            }
        }

        // Добавление обработчиков событий
        function addEventListeners() {
            // Для числовых полей ввода при ползунках
            document.querySelectorAll('.range-number').forEach(input => {
                input.addEventListener('change', function() {
                    const settingId = this.closest('[data-id]').dataset.id;
                    updateSetting(settingId, this.value);
                });
            });
        }

        // Обновление значения при изменении ползунка
        function updateRange(settingId, value) {
            // Обновляем связанное числовое поле
            const container = document.querySelector(`[data-id="${settingId}"]`);
            if (container) {
                const numberInput = container.querySelector('.range-number');
                if (numberInput) {
                    numberInput.value = value;
                }
            }

            updateSetting(settingId, value);
        }

        // Получение значений из множественного выбора
        function getMultipleValues(select) {
            const selected = [];
            for (let option of select.options) {
                if (option.selected) {
                    selected.push(option.value);
                }
            }
            return selected;
        }

        // Обновление настройки
        function updateSetting(settingId, value) {
            // Преобразуем значение в правильный тип
            const setting = settings.find(s => s.id === settingId);
            if (setting) {
                switch(setting.type) {
                    case 'toggle':
                        value = Boolean(value);
                        break;
                    case 'range':
                        value = parseFloat(value);
                        if (isNaN(value)) value = setting.min || 0;

                        // Ограничиваем значение в пределах
                        if (setting.min !== undefined) value = Math.max(setting.min, value);
                        if (setting.max !== undefined) value = Math.min(setting.max, value);

                        // Обновляем ползунок если есть
                        const container = document.querySelector(`[data-id="${settingId}"]`);
                        if (container) {
                            const rangeInput = container.querySelector('input[type=range]');
                            const numberInput = container.querySelector('.range-number');
                            if (rangeInput) rangeInput.value = value;
                            if (numberInput) numberInput.value = value;
                        }
                        break;
                }
            }

            currentValues[settingId] = value;

            // Обновляем текст переключателя если это toggle
            if (setting && setting.type === 'toggle') {
                const container = document.querySelector(`[data-id="${settingId}"]`);
                if (container) {
                    const toggleLabel = container.querySelector('.toggle-label');
                    if (toggleLabel) {
                        toggleLabel.textContent = value ? 'Вкл' : 'Выкл';
                    }
                }
            }

            // Отправляем изменение в C++
            webui.call('setting_changed', JSON.stringify({
                id: settingId,
                value: value
            }));

            updateButtonsState();
        }

        // Обновление состояния кнопок
        function updateButtonsState() {
            const saveButton = document.getElementById('saveButton');
            const resetButton = document.getElementById('resetButton');

            const hasChanges = Object.keys(currentValues).some(
                key => JSON.stringify(currentValues[key]) !== JSON.stringify(originalValues[key])
            );

            saveButton.disabled = !hasChanges;
            resetButton.disabled = !hasChanges;

            saveButton.style.opacity = saveButton.disabled ? '0.5' : '1';
            resetButton.style.opacity = resetButton.disabled ? '0.5' : '1';

            saveButton.style.cursor = saveButton.disabled ? 'not-allowed' : 'pointer';
            resetButton.style.cursor = resetButton.disabled ? 'not-allowed' : 'pointer';
        }

        // Сохранение изменений
        function saveChanges() {
            if (document.getElementById('saveButton').disabled) return;

            showStatus('Сохранение...', '');

            webui.call('save_settings', JSON.stringify({
                values: currentValues,
                originalValues: originalValues
            }));
        }

        // Функция, вызываемая из C++ после сохранения
        function onSaveComplete(result) {
            try {
                const data = JSON.parse(result);

                if (data.success) {
                    // Обновляем оригинальные значения
                    originalValues = { ...currentValues };

                    // Показываем успешный статус
                    showStatus('Настройки успешно сохранены', 'success');

                    // Обновляем состояние кнопок
                    updateButtonsState();

                    // Очищаем статус через 3 секунды
                    setTimeout(() => {
                        document.getElementById('saveStatus').classList.remove('show');
                    }, 3000);
                } else {
                    showStatus(data.message || 'Ошибка при сохранении', 'error');
                }
            } catch (e) {
                console.error('Error parsing save result:', e);
                showStatus('Ошибка при сохранении', 'error');
            }
        }

        // Сброс изменений
        function resetChanges() {
            // Восстанавливаем оригинальные значения
            currentValues = { ...originalValues };

            // Перерисовываем настройки
            renderSettings();

            // Обновляем состояние кнопок
            updateButtonsState();

            // Вызываем C++ функцию для уведомления о сбросе
            webui.call('settings_reset');

            showStatus('Изменения сброшены', '');
            setTimeout(() => {
                document.getElementById('saveStatus').classList.remove('show');
            }, 2000);
        }

        // Показ статуса
        function showStatus(message, type) {
            const status = document.getElementById('saveStatus');
            status.textContent = message;
            status.className = `save-status show ${type}`;
        }

        // Возврат в главное меню
        function goToMainMenu() {
            if (hasUnsavedChanges()) {
                if (confirm('У вас есть несохраненные изменения. Вы действительно хотите выйти?')) {
                    webui.call('go_to_main_menu');
                }
            } else {
                webui.call('go_to_main_menu');
            }
        }

        // Проверка наличия несохраненных изменений
        function hasUnsavedChanges() {
            return Object.keys(currentValues).some(
                key => JSON.stringify(currentValues[key]) !== JSON.stringify(originalValues[key])
            );
        }

        // Обработчик закрытия страницы
        window.addEventListener('beforeunload', function (e) {
            if (hasUnsavedChanges()) {
                e.preventDefault();
                e.returnValue = 'У вас есть несохраненные изменения. Вы действительно хотите покинуть страницу?';
            }
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            // Запрашиваем настройки при загрузке
            webui.call('load_settings');
        });
    </script>
</body>
</html>
